# PolyBot Configuration
mode: "paper"  # "paper" or "live"

scanner:
  interval_seconds: 300  # 5 minutes
  max_markets_per_cycle: 100

filters:
  min_volume_24h: 1000
  min_liquidity: 500
  min_days_to_expiry: 2
  max_days_to_expiry: 60
  max_spread: 0.05
  category_whitelist: []   # empty = all categories
  category_blacklist: []

brain:
  model: "claude-sonnet-4-6"
  min_confidence: "high"
  min_probability: 0.65
  active_prompt_version: "v001"
  max_concurrent_calls: 10

math:
  ev_threshold: 0.05
  kelly_fraction: 0.25
  entry_discount: 0.85
  exit_target: 0.90
  stop_loss_pct: 0.15
  time_stop_hours: 24
  time_stop_min_gain: 0.02
  bayesian_price_trigger: 0.08
  bayesian_volume_trigger: 3.0

execution:
  max_slippage: 0.02
  max_bankroll_deployed: 0.80
  max_concurrent_positions: 5
  initial_bankroll: 100.0

agents:
  outcome_reviewer_interval_seconds: 3600
  daily_pipeline_hour: 2
  prompt_optimizer_min_improvement: 0.03
  prompt_optimizer_backtest_count: 50

discord:
  trade_channel_name: "polybot-trades"
  control_channel_name: "polybot-control"

database:
  path: "polybot/db/polybot.db"

# TA Strategy Configuration
binance:
  symbol: "btcusdt"
  ws_url: "wss://stream.binance.us:9443/ws"
  rest_url: "https://api.binance.us/api/v3"
  candle_buffer_size: 200

indicators:
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  stochastic:
    k_period: 14
    d_smoothing: 3
    overbought: 80
    oversold: 20
  ema:
    fast_period: 9
    slow_period: 21
    chop_threshold: 0.0001  # 0.01% — loosened for 1-min candle granularity
  obv:
    slope_period: 5
  vwap:
    session_minutes: 5
  atr:
    period: 14
    low_percentile: 25
    high_percentile: 90
    history_periods: 100

signal:
  entry_threshold: 0.40  # Loosened for paper trading — learning agents will tighten
  weights:
    rsi: 0.20
    macd: 0.25
    stochastic: 0.20
    obv: 0.15
    vwap: 0.20
  active_weights_version: "weights_v001"

market:
  contract_type: "btc_5min"
  entry_window_seconds: 300
  min_time_remaining_seconds: 5
  scan_cache_seconds: 5

scalping:
  take_profit_pct: 0.10    # Sell when contract price rises 10% above entry
  stop_loss_pct: 0.08      # Cut when contract price drops 8% below entry
  trailing_profit: false    # Future: trail the profit instead of fixed target
