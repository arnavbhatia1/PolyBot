mode: paper   # paper | live

# =============================================================================
#  SECTION 1: MONEY / RISK - how much to bet and when to stop
# =============================================================================
math:
  kelly_fraction: 0.08        # Fraction of bankroll staked per Kelly unit. Lower = smaller bets.

circuit_breaker:
  floor_pct: 0.85             # Lock in a floor at 85% of each bankroll milestone ($100/$150/$200/...)
  min_multiplier: 0.4         # Kelly never goes below 40% of normal once floor kicks in
  losses_to_reduce: 3         # Consecutive losses before Kelly starts scaling down
  wins_to_restore: 3          # Consecutive wins to restore full Kelly

execution:
  max_bankroll_deployed: 0.8  # Never deploy more than 80% of bankroll across all positions
  max_concurrent_positions: 2 # Max live positions at once (across different windows)
  max_book_fill_pct: 0.5      # Never fill more than 50% of the visible book depth (avoids moving market)
  initial_bankroll: 100.0     # Starting bankroll for paper mode

  # Paper mode realism (ignore for live)
  max_slippage: 0.02
  slippage_impact_pct: 0.03
  backtest_realism_factor: 0.85
  paper_latency_mean_s: 0.77
  paper_latency_jitter_s: 0.40
  paper_network_fail_rate: 0.02
  use_maker_orders: false
  maker_timeout_s: 15.0

# =============================================================================
#  SECTION 2: ENTRY GATES - when to enter a trade
# =============================================================================
signal:
  # --- Edge gates (most important) ---
  min_edge: 0.04              # Minimum model-vs-market gap to enter
  max_edge: 0.2               # Reject if edge > 20% — likely a stale/phantom price, not real opportunity.
  min_model_probability: 0.56 # Model must be x% confident in chosen direction
  min_kelly: 0.01            # Kelly fraction must be at least x% (filters near-worthless bets)

  # --- Exit / loss-cut ---
  exit_edge_threshold: -0.07  # Scalp when holding_edge drops below x%.
  loss_cut_fraction: 0.65     # Force exit if market < entry × 65% with < loss_cut_time_s remaining.
  loss_cut_time_s: 90.0      # Last X seconds: if position is deeply underwater, cut it.

  # --- Adverse selection ---
  adverse_selection_threshold: 0.65  # Skip entry if 65%+ of recent fills reversed within 30s.
  edge_decay_threshold: -0.05        # Skip entry when mean 15s post-fill drift is worse than -5¢.
                                     # Inactive until ≥15 resolved fills in the 30-min lookback.

  # --- Volatility filter ---
  min_atr: 12.0               # Skip entries when the market is too quiet.

  # --- Late window ---
  late_window_min_prob: 0.4   # In last 2 mins: model must be at least x% to enter (filters deep underdogs).

  # =============================================================================
  #  PIPELINE TUNABLE MODEL WEIGHTS
  # =============================================================================
  atr_sigma_ratio: 1.3        # L1: lower = sharper/more confident probabilities from BTC distance
  student_t_df: 5             # L1: tail fatness (5 = BTC-appropriate fat tails, don't change)
  logit_scale: 4.0            # Amplifier on all signal layers (L2-L5). Higher = signals matter more.
  momentum_weight: 0.04       # L4 magnitude (unsigned).
  regime_weight: 0.03         # L2: how much trending/reverting autocorrelation affects the bet.
  flow_weight: 0.04           # L3: CLOB order book imbalance signal strength.
  spot_flow_weight: 0.1       # L3b: Binance CVD (buy/sell pressure) signal strength.
  liquidation_weight: 0.03    # L3e: Bybit liquidation cascade signal strength.
  prev_margin_weight: 0.02    # L5: carry from last window's resolution (momentum).
  regime_lookback: 50         # How many 1-min candles to measure trend/mean-reversion over.

  # L4 indicator mix
  weights:
    rsi: 0.2
    macd: 0.3
    stochastic: 0.15
    obv: 0.15
    vwap: 0.2

  # =============================================================================
  #  STRUCTURAL CONSTANTS - shape params, pipeline-tunable
  # =============================================================================
  regime_momentum_threshold: 0.15   # |autocorr| above this → real regime (L2/L4)
  flow_combined_cap: 0.35           # max combined L3+L3b logit per tick
  final_logit_clamp: 4.0            # ±N clamp on stacked logit before sigmoid
  deep_loss_hold_threshold: -0.10   # below this holding_edge → hold to resolution
  l5_regime_damp_cap: 0.7           # max regime damp on L5
  atr_regime_shift_threshold: 0.60  # ATR_short/ATR_long below this widens floor

  # =============================================================================
  #  DERIVED FEATURES (L6) - default 0.0 = layer is dead
  # =============================================================================
  # Pipeline raises any of these off zero to switch the corresponding L6
  # feature on. Each contribution is bounded; total L6 capped at ±0.25 logits.
  derived:
    log_atr_ratio: 0.0
    autocorr_signed_mag: 0.0
    vol_regime_shift: 0.0
    flow_disagreement: 0.0
    distance_atr_ratio: 0.0
    time_remaining_logit: 0.0
    liq_signed_sqrt: 0.0
    prev_margin_sq: 0.005

  # Consensus sizing: how much to scale bet when all flow signals agree
  consensus_dead_zone: 0.05
  consensus:
    very_high_pct: 0.8        # 80%+ signals agree → 1.3× size
    very_high_mult: 1.3
    high_pct: 0.6             # 60%+ agree → 1.0×
    high_mult: 1.0
    medium_pct: 0.4           # 40%+ agree → 0.8×
    medium_mult: 0.8
    low_mult: 0.6             # Less than 40% agree → 0.6×

# =============================================================================
#  SECTION 3: ENTRY TIMING
# =============================================================================
entry_timing:
  normal_fraction: 0.6        # First 60% of window (0-180s): full Kelly, no penalty.
  late_max_penalty: 0.30      # Last 40%: ATM trades penalized up to x%.
  flip_edge_premium: 0.015    # Re-entry costs extra 1.5% edge on top of min_edge.

# =============================================================================
#  SECTION 4: SPRT GATE - sequential evidence test before entering
# =============================================================================
#  SPRT watches the model signal across multiple ticks and blocks entry unless it sees consistent directional evidence.
sprt:
  alpha: 0.05                 # False positive rate. Lower = stricter (more SKIP blocks)
  beta: 0.1                   # False negative rate. Lower = stricter (harder to get ENTER).
  observation_interval_s: 5.0 # Check signal every x seconds.
  min_confidence: 0.02        # Minimum confidence to allow entry.

# =============================================================================
#  SECTION 5: SCHEDULE
# =============================================================================
schedule:
  trading_start_hour_et: 0    # Start at 12:01 AM ET
  trading_start_minute: 1
  trading_end_hour_et: 23     # Stop at 11:30 PM ET
  trading_end_minute: 30

agents:
  outcome_reviewer_interval_seconds: 3600
  daily_pipeline_hour: 23     # Run pipeline at 11:45 PM ET
  daily_pipeline_minute: 45

# =============================================================================
#  SECTION 6: REGIME FILTER - skip entries in bad market conditions
# =============================================================================
regime:
  lookback: 50                # Candles to measure regime over
  vol_high_percentile: 75     # ATR above 75th pct = "volatile" regime
  vol_low_percentile: 25      # ATR below 25th pct = "quiet" regime → skip entries
  autocorr_threshold: 0.25    # 1-lag autocorr threshold to call something "trending"

# =============================================================================
#  DO NOT TOUCH - infrastructure settings
# =============================================================================
market:
  contract_type: btc_5min
  entry_window_seconds: 300
  min_time_remaining_seconds: 0
  scan_cache_seconds: 5
  clob_url: https://clob.polymarket.com
  clob_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  min_book_depth_usd: 50
  max_spread: 0.1

discord:
  trade_channel_name: polybot-trades
  control_channel_name: polybot-control
  daily_channel_name: polybot-daily

database:
  path: polybot/db/polybot.db

binance:
  symbol: btcusdt
  ws_url: wss://stream.binance.com:9443/ws
  rest_url: https://api.binance.com/api/v3
  candle_buffer_size: 200

binance_depth:
  ws_url: wss://stream.binance.com:9443/ws/btcusdt@depth20@100ms
  rest_url: https://api.binance.com/api/v3

binance_trades:
  ws_url: wss://stream.binance.com:9443/ws/btcusdt@aggTrade

coinbase:
  ws_url: wss://ws-feed.exchange.coinbase.com
  product_id: BTC-USD

bybit:
  ws_url: wss://stream.bybit.com/v5/public/linear
  rest_url: https://api.bybit.com

indicators:
  rsi:
    period: 5
    overbought: 70
    oversold: 30
  macd:
    fast_period: 5
    slow_period: 13
    signal_period: 4
  stochastic:
    k_period: 5
    d_smoothing: 2
    overbought: 80
    oversold: 20
  ema:
    fast_period: 3
    slow_period: 8
    chop_threshold: 0.0001
  obv:
    slope_period: 3
  atr:
    period: 7
    low_percentile: 5
    history_periods: 100
