mode: paper   # paper | live

# =============================================================================
#  SECTION 1: MONEY / RISK - how much to bet and when to stop
# =============================================================================
math:
  kelly_fraction: 0.08        # Fraction of bankroll staked per Kelly unit. Lower = smaller bets.

circuit_breaker:
  floor_pct: 0.85             # Lock in a floor at 85% of each bankroll milestone ($100/$150/$200/...)
  min_multiplier: 0.4         # Kelly never goes below 40% of normal once floor kicks in
  losses_to_reduce: 3         # Consecutive losses before a Discord streak alert (does NOT affect sizing)
  wins_to_restore: 3          # Consecutive wins before a Discord streak alert (does NOT affect sizing)

execution:
  max_bankroll_deployed: 0.8  # Never deploy more than 80% of bankroll across all positions
  max_concurrent_positions: 2 # Max live positions at once (across different windows)
  max_book_fill_pct: 0.5      # Never fill more than 50% of the visible book depth (avoids moving market)
  initial_bankroll: 100.0     # Starting bankroll for paper mode

  # Phase 1 passive exits (two-stage: rest SELL at mid for passive_exit_timeout_s,
  # take the maker fill if a BUY prints through, else FOK fallback). Live in paper
  # only — LiveTrader has no GTC subsystem, so it stays FOK there. Kill bar
  # (scripts/shadow_passive_exit.py): ITM fill 83-87% over 4 days, +$0.056/fill.
  passive_exit_enabled: true
  passive_exit_timeout_s: 10.0

  # Paper mode realism (ignore for live). Latency matched to the measured Canada-VPN
  # warm POST RTT (~0.135s); retune to the Dublin VPS (~0.04s) when that deploy lands.
  slippage_impact_pct: 0.03
  paper_latency_mean_s: 0.16
  paper_latency_jitter_s: 0.04
  paper_network_fail_rate: 0.18

# =============================================================================
#  SECTION 2: SIGNAL — L1 fair-value anchor + entry gates + exit engine
#
#  Entry is inventory sourcing, not forecasting (the CLOB price beats every
#  feature stack — tasks/todo.md). L1 exists to anchor the fee/spread/Kelly
#  gates; the bot's edge is the exit engine. All knobs are operator-owned —
#  the nightly knob-tuning pipeline was deleted with the entry stack.
# =============================================================================
signal:
  # --- Edge gates ---
  min_edge: 0.04              # Minimum model-vs-market gap to enter
  max_edge: 0.2               # Reject if edge > 20% — likely a stale/phantom price, not real opportunity.
  min_model_probability: 0.56 # Model must be x% confident in chosen direction
  min_kelly: 0.01             # Kelly fraction must be at least x% (filters near-worthless bets)

  # --- Exit / loss-cut (the edge lives here) ---
  exit_edge_threshold: -0.10  # Scalp when holding_edge drops below x% (Phase 3 replaces the
                              # hand curve with the learned exit-value model).
  loss_cut_fraction: 0.65     # Force exit if market < entry × 65% with < loss_cut_time_s remaining.
  loss_cut_time_s: 90.0       # Last X seconds: if position is deeply underwater, cut it.
  deep_loss_hold_threshold: -0.10  # Below this holding_edge → hold to resolution.

  # --- Adverse selection (sizing penalty, not entry gate) ---
  # `adverse_rate_at_30s` shrinks Kelly through `1 − adverse_penalty_slope × max(0, adverse_rate − adverse_penalty_floor)`
  # capped to [adverse_penalty_min, 1.0]. Hard-skip only if adverse_rate ≥ adverse_selection_threshold.
  adverse_penalty_floor: 0.45 # Below this, no penalty.
  adverse_penalty_slope: 1.5  # Penalty steepness; at slope=1.5, adverse=0.85 → kelly_mult=0.40.
  adverse_penalty_min: 0.30   # Floor so the trade can still happen with reduced size.
  adverse_selection_threshold: 0.80  # Hard-skip when fade rate ≥ 80% (kept as emergency cutoff).
  edge_decay_threshold: -0.05 # Skip entry when mean 15s post-fill drift is worse than -5¢.
                              # Inactive until ≥15 resolved fills in the 30-min lookback.

  # --- L1 model (the only model) ---
  min_atr: 12.0               # Skip entries when the market is too quiet.
  atr_sigma_ratio: 1.3        # Lower = sharper/more confident probabilities from BTC distance
  student_t_df: 5             # Tail fatness (5 = BTC-appropriate fat tails)
  regime_lookback: 50         # 1-min candles for the lag-1 autocorr that scales remaining vol
  atr_regime_shift_threshold: 0.60  # ATR_short/ATR_long below this widens the ATR floor

# =============================================================================
#  SECTION 3: ENTRY TIMING
# =============================================================================
entry_timing:
  normal_fraction: 0.6        # First 60% of window (0-180s): full Kelly, no penalty.
  late_max_penalty: 0.30      # Last 40%: ATM trades penalized up to x%.
  flip_edge_premium: 0.015    # Base re-entry edge premium. Scaled by flip count at runtime:
                              #     effective premium = base + 0.005 × max(0, flip_count − 2).

# =============================================================================
#  SECTION 4: SCHEDULE
# =============================================================================
schedule:
  trading_start_hour_et: 0    # Start at 12:01 AM ET
  trading_start_minute: 1
  trading_end_hour_et: 23     # Stop at 11:30 PM ET
  trading_end_minute: 30

agents:
  outcome_reviewer_interval_seconds: 3600
  daily_pipeline_hour: 23     # Nightly jobs (rollups, model refit, wallet tables) at 11:45 PM ET
  daily_pipeline_minute: 45

# =============================================================================
#  DO NOT TOUCH - infrastructure settings
# =============================================================================
market:
  entry_window_seconds: 300
  min_time_remaining_seconds: 0
  scan_cache_seconds: 5
  clob_url: https://clob.polymarket.com
  clob_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  min_book_depth_usd: 50
  max_spread: 0.1

discord:
  trade_channel_name: polybot-trades
  control_channel_name: polybot-control
  daily_channel_name: polybot-daily

database:
  path: polybot/db/polybot.db

binance:
