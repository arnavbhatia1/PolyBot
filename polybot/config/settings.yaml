# PolyBot Configuration
mode: "paper"  # "paper" or "live"

math:
  kelly_fraction: 0.15  # Fraction of Kelly to use (0.15 = conservative)

execution:
  max_slippage: 0.02
  max_bankroll_deployed: 0.80
  max_concurrent_positions: 1  # One position at a time — full Kelly on best edge
  initial_bankroll: 1000.0

agents:
  outcome_reviewer_interval_seconds: 3600
  daily_pipeline_hour: 20  # 4:45 PM EST (20:45 UTC)
  daily_pipeline_minute: 45

discord:
  trade_channel_name: "polybot-trades"
  control_channel_name: "polybot-control"
  daily_channel_name: "polybot-daily"

database:
  path: "polybot/db/polybot.db"

# TA Strategy Configuration
binance:
  symbol: "btcusdt"
  ws_url: "wss://stream.binance.us:9443/ws"
  rest_url: "https://api.binance.us/api/v3"
  candle_buffer_size: 200

indicators:
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  stochastic:
    k_period: 14
    d_smoothing: 3
    overbought: 80
    oversold: 20
  ema:
    fast_period: 9
    slow_period: 21
    chop_threshold: 0.0001  # 0.01% — loosened for 1-min candle granularity
  obv:
    slope_period: 5
  vwap:
    session_minutes: 5
  atr:
    period: 14
    low_percentile: 5     # Only block truly dead markets
    high_percentile: 95   # Only block extreme chaos
    history_periods: 100

signal:
  entry_threshold: 0.20  # Minimum edge — tunable by learning pipeline (range: 0.05-0.35)
  exit_edge_threshold: -0.10  # Exit when holding edge drops — tunable by pipeline (range: -0.25 to 0.0)
  min_model_probability: 0.65  # Min confidence to enter — tunable by pipeline (range: 0.55-0.85)
  momentum_weight: 0.08  # Max ±8% indicator nudge — must stay below entry_threshold so indicators alone can't trigger trades
  weights:
    rsi: 0.20
    macd: 0.25
    stochastic: 0.20
    obv: 0.15
    vwap: 0.20
  active_weights_version: "weights_v001"

market:
  contract_type: "btc_5min"
  entry_window_seconds: 300
  min_time_remaining_seconds: 20  # Tunable by learning pipeline (range: 0-120)
  scan_cache_seconds: 5
  clob_url: "https://clob.polymarket.com"  # Real order book (public, no auth)
  min_book_depth_usd: 50  # Skip if ask depth < $50 (no real liquidity)

schedule:
  trading_start_hour_et: 8    # 8 AM ET (auto-adjusts for EST/EDT)
  trading_start_minute: 0
  trading_end_hour_et: 16     # 4:30 PM ET
  trading_end_minute: 30

# Active position management: hold to $1 when model is confident,
# exit early when holding_edge drops below exit_edge_threshold.
# Same probability model for entry AND exit decisions.
