mode: live   # paper | live

# =============================================================================
#  SECTION 1: MONEY / RISK - how much to bet and when to stop
# =============================================================================
math:
  kelly_fraction: 0.08        # Fraction of bankroll staked per Kelly unit. Lower = smaller bets.

circuit_breaker:
  floor_pct: 0.85             # Lock in a floor at 85% of each bankroll milestone ($100/$150/$200/...)
  min_multiplier: 0.4         # Kelly never goes below 40% of normal once floor kicks in
  losses_to_reduce: 3         # Consecutive losses before a Discord streak alert (does NOT affect sizing)
  wins_to_restore: 3          # Consecutive wins before a Discord streak alert (does NOT affect sizing)

execution:
  max_bankroll_deployed: 0.8  # Never deploy more than 80% of bankroll across all positions
  max_concurrent_positions: 2 # Max live positions at once (across different windows)
  max_book_fill_pct: 0.5      # Never fill more than 50% of the visible book depth (avoids moving market)
  initial_bankroll: 100.0     # Starting bankroll for paper mode

  # Passive exits (two-stage: rest SELL at mid for passive_exit_timeout_s, take the
  # maker fill if a BUY prints through, else FOK fallback). OFF — measured honestly
  # on 8 clean days (06-24..07-01, rest-vs-immediate-FOK incl. miss cost + markout):
  # −2.1c/sh, −$62/day, t_day −2.03, 6/8 days negative. Maker fills at mid are
  # markout-fair: no harvestable rent, the half-spread comes back as adverse selection
  # on the misses. ~Moot under sniper-only (rests need >15s left; sniper enters <45s).
  passive_exit_enabled: false
  passive_exit_timeout_s: 10.0

  # Paper mode realism (ignore for live). Calibrated to the operator's MEASURED warm POST
  # RTT to the Polymarket CLOB through the IRELAND VPN: TTFB ~0.118s / 0.138s warm, ~0.352s
  # cold, 3/3 reads OK (Cloudflare is NOT blocking the Ireland IP — good). This is the live
  # path, so paper fills now behave like live => the paper->live switch barely changes results.
  # If the host changes, re-measure and update (a VPS *in* Dublin would roughly halve this to
  # ~40-60ms and strengthen the latency-sensitive sniper). network_fail_rate is still an
  # ESTIMATE — no live order-VOLUME sample yet; calibrate from the observed live FOK success
  # rate, and run smoke_order_test.py --confirm to prove order POSTs clear Cloudflare
  # (verify_keys.py covers GETs only).
  slippage_impact_pct: 0.03
  paper_latency_mean_s: 0.125      # Ireland-VPN warm POST RTT (measured ~0.111-0.138)
  paper_latency_jitter_s: 0.02     # warm spread (gauss std)
  paper_latency_floor_s: 0.111     # fastest measured warm RTT — the latency floor
  paper_network_fail_rate: 0.03    # 0 network errors in first 29 live POSTs — consistent, keep

# =============================================================================
#  SECTION 2: SIGNAL — L1 fair-value anchor + entry gates + exit engine
#
#  The deployable edge is the late-window sniper (SECTION 3b); the base entry
#  strategy below has no proven edge and runs in paper only as the evidence
#  engine (the CLOB price beats every feature stack — tasks/todo.md). L1
#  anchors the fee/spread/Kelly gates. All knobs are operator-owned.
# =============================================================================
signal:
  # --- Edge gates ---
  min_edge: 0.04              # Minimum model-vs-market gap to enter
  max_edge: 0.2               # Reject if edge > 20% — likely a stale/phantom price, not real opportunity.
  min_model_probability: 0.56 # Model must be x% confident in chosen direction
  min_kelly: 0.01             # Kelly fraction must be at least x% (filters near-worthless bets)

  # --- Exit / loss-cut ---
  exit_edge_threshold: -0.10  # Scalp when holding_edge drops below x% (blended with the
                              # ExitBoundary curve at decision time).
  loss_cut_fraction: 0.65     # Force exit if market < entry × 65% with < loss_cut_time_s remaining.
  loss_cut_time_s: 90.0       # Last X seconds: if position is deeply underwater, cut it.
  deep_loss_hold_threshold: -0.10  # Below this holding_edge → hold to resolution.

  # --- Adverse selection (sizing penalty, not entry gate) ---
  # `adverse_rate_at_30s` shrinks Kelly through `1 − adverse_penalty_slope × max(0, adverse_rate − adverse_penalty_floor)`
  # capped to [adverse_penalty_min, 1.0]. Hard-skip only if adverse_rate ≥ adverse_selection_threshold.
  adverse_penalty_floor: 0.45 # Below this, no penalty.
  adverse_penalty_slope: 1.5  # Penalty steepness; at slope=1.5, adverse=0.85 → kelly_mult=0.40.
  adverse_penalty_min: 0.30   # Floor so the trade can still happen with reduced size.
  adverse_selection_threshold: 0.80  # Hard-skip when fade rate ≥ 80% (kept as emergency cutoff).
  edge_decay_threshold: -0.05 # Skip entry when mean 15s post-fill drift is worse than -5¢.
                              # Inactive until ≥15 resolved fills in the 30-min lookback.

  # --- L1 model (the only model) ---
  min_atr: 12.0               # Skip entries when the market is too quiet.
  atr_sigma_ratio: 1.3        # L1 vol scale: vol_scaled = ATR / this. Higher = sharper/more confident probs, lower = wider. Raw, uncalibrated L1 setting.
  student_t_df: 5             # Tail fatness (5 = BTC-appropriate fat tails)
  regime_lookback: 50         # 1-min candles for the lag-1 autocorr that scales remaining vol
  atr_regime_shift_threshold: 0.60  # ATR_short/ATR_long below this widens the ATR floor

# =============================================================================
#  SECTION 3: ENTRY TIMING
# =============================================================================
entry_timing:
  normal_fraction: 0.6        # First 60% of window (0-180s): full Kelly, no penalty.
  late_max_penalty: 0.30      # Last 40%: ATM trades penalized up to x%.
  flip_edge_premium: 0.015    # Base re-entry edge premium. Scaled by flip count at runtime:
                              #     effective premium = base + 0.005 × max(0, flip_count − 2).

# =============================================================================
#  SECTION 3b: LATE-WINDOW SNIPER (gated — the one bot-formable late-window edge)
#
#  Final-seconds entry: a sharp Coinbase move (the resolution venue) pushed price
#  past strike but the CLOB ask hasn't repriced yet (a stale-book lag in OUR favor).
#  Buys that side, bypassing ONLY max_edge (-> sniper_max_edge) and the late-window
#  time penalty; every safety gate (adverse, edge-decay, depth, net-edge, min-size,
#  pre-submit VWAP, freshness) stays. DISABLED until its kill bar passes AT THE
#  ACHIEVED RTT: scripts/analyze_late_window.py must show momentum t_day>=2 AND p10>0
#  over >=8 clean ET days at your host's measured RTT. DO NOT enable on faith.
# =============================================================================
late_window:
  sniper_enabled: true         # PAPER-SHADOW ON (validation). SAFE ONLY because mode==paper above.
                               # DO NOT set mode: live until the kill bar passes at the host's
                               # measured RTT + this shadow confirms (tasks/todo.md). Revert to
                               # false to stop the shadow.
  sniper_only: true            # true = base-entry BUYs are suppressed (recorded as "sniper_only"
                               # ghosts, so the base strategy keeps accruing evidence at zero cost)
                               # and capital deploys ONLY on sniper fires. ON in paper so the shadow
                               # trades the SAME fire population live would (with it off, the base
                               # path consumed the high-conviction sniper moments first and the
                               # shadow sampled only the prob<0.56 sliver). The live recipe, once
                               # the kill bar passes, is: mode: live + sniper_enabled: true +
                               # sniper_only: true — never deploy the base strategy live (no edge).
  sniper_late_start_s: 45.0     # only fire in the final N seconds of the window
  sniper_move_window_s: 2.0     # Coinbase move lookback (s)
  sniper_cb_move: 8.0           # $ Coinbase move over the lookback to fire (matches the harness default)
  sniper_ask_cap: 0.92          # only buy if the chosen side's ask is still <= this (book not yet repriced)
  sniper_min_edge: 0.04         # stale-cheap floor; set = signal.min_edge so the downstream net-edge /
                                # pre-submit gates don't silently raise it (one consistent live floor).
                                # NOTE: the offline harness momentum signal has NO edge floor, so live
                                # trades the higher-conviction SUBSET (L1 edge >= this) — the kill bar is
                                # a CONSERVATIVE directional gate; paper-shadow before deploy (tasks/todo.md).
  sniper_max_edge: 0.50         # sniper's own sanity cap, replacing the bypassed 0.20

# =============================================================================
#  SECTION 4: SCHEDULE
# =============================================================================
schedule:
  trading_start_hour_et: 0    # Start at 12:01 AM ET
  trading_start_minute: 1
  trading_end_hour_et: 23     # Stop at 11:30 PM ET
  trading_end_minute: 30

agents:
  outcome_reviewer_interval_seconds: 3600
  daily_pipeline_hour: 23     # Nightly jobs (rollups, retention sweep, sniper health report) at 11:45 PM ET
  daily_pipeline_minute: 45

# =============================================================================
#  DO NOT TOUCH - infrastructure settings
# =============================================================================
market:
  entry_window_seconds: 300
  min_time_remaining_seconds: 0
  scan_cache_seconds: 5
  clob_url: https://clob.polymarket.com
  clob_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  min_book_depth_usd: 50
  max_spread: 0.1

discord:
  trade_channel_name: polybot-trades
  control_channel_name: polybot-control
  daily_channel_name: polybot-daily

database:
  path: polybot/db/polybot.db

binance:
  symbol: btcusdt
  ws_url: wss://stream.binance.com:9443/ws
  rest_url: https://api.binance.com/api/v3
  candle_buffer_size: 200

binance_depth:
  ws_url: wss://stream.binance.com:9443/ws

binance_trades:
  ws_url: wss://stream.binance.com:9443/ws

coinbase:
  ws_url: wss://ws-feed.exchange.coinbase.com
  product_id: BTC-USD

indicators:
