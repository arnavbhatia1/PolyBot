mode: paper
math:
  kelly_fraction: 0.15
circuit_breaker:
  floor_pct: 0.85
  min_multiplier: 0.4
  losses_to_reduce: 3
  wins_to_restore: 2
execution:
  max_slippage: 0.02
  max_bankroll_deployed: 0.8
  max_single_position_pct: 0.12
  max_single_position_usd: 18.0
  max_concurrent_positions: 2
  max_book_fill_pct: 0.5
  slippage_impact_pct: 0.03
  backtest_realism_factor: 0.85
  paper_latency_mean_s: 0.08
  paper_latency_jitter_s: 0.04
  paper_network_fail_rate: 0.02
  initial_bankroll: 100.0
  use_maker_orders: false
  maker_timeout_s: 60.0
agents:
  outcome_reviewer_interval_seconds: 3600
  daily_pipeline_hour: 23
  daily_pipeline_minute: 15
discord:
  trade_channel_name: polybot-trades
  control_channel_name: polybot-control
  daily_channel_name: polybot-daily
database:
  path: polybot/db/polybot.db
binance:
  symbol: btcusdt
  ws_url: wss://stream.binance.us:9443/ws
  rest_url: https://api.binance.us/api/v3
  candle_buffer_size: 200
indicators:
  rsi:
    period: 5
    overbought: 70
    oversold: 30
  macd:
    fast_period: 5
    slow_period: 13
    signal_period: 4
  stochastic:
    k_period: 5
    d_smoothing: 2
    overbought: 80
    oversold: 20
  ema:
    fast_period: 3
    slow_period: 8
    chop_threshold: 0.0001
  obv:
    slope_period: 3
  vwap:
    session_minutes: 5
  atr:
    period: 7
    low_percentile: 5
    high_percentile: 95
    history_periods: 100
signal:
  entry_threshold: 0.04
  max_edge: 0.2
  adverse_selection_threshold: 0.8
  late_window_min_prob: 0.4
  exit_edge_threshold: -0.05
  min_model_probability: 0.58
  momentum_weight: -0.02
  regime_weight: 0.03
  regime_lookback: 50
  min_kelly: 0.015
  atr_sigma_ratio: 1.3
  min_atr: 8.0
  flow_weight: 0.04
  spot_flow_weight: 0.04
  wall_weight: 0.0
  prev_margin_weight: 0.02
  liquidation_weight: 0.03
  student_t_df: 5
  logit_scale: 4.0
  probability_compression: 1.0
  consensus_dead_zone: 0.05
  weights:
    rsi: 0.2
    macd: 0.25
    stochastic: 0.2
    obv: 0.15
    vwap: 0.2
  active_weights_version: weights_v001
  consensus:
    very_high_pct: 0.8
    very_high_mult: 1.3
    high_pct: 0.6
    high_mult: 1.0
    medium_pct: 0.4
    medium_mult: 0.8
    low_mult: 0.6
  exit:
    patience_seconds: 120
    patience_max_penalty: 0.05
    urgency_seconds: 120
    urgency_max_bonus: 0.05
    hold_min_prob: 0.5
    panic_edge: -0.2
    low_price_hold: 0.15
market:
  contract_type: btc_5min
  entry_window_seconds: 300
  min_time_remaining_seconds: 0
  scan_cache_seconds: 5
  clob_url: https://clob.polymarket.com
  clob_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  min_book_depth_usd: 50
  max_spread: 0.1
schedule:
  trading_start_hour_et: 0
  trading_start_minute: 15
  trading_end_hour_et: 23
  trading_end_minute: 0
binance_depth:
  ws_url: wss://stream.binance.us:9443/ws/btcusdt@depth20@100ms
  rest_url: https://api.binance.us/api/v3
  poll_interval_s: 5.0
binance_trades:
  ws_url: wss://stream.binance.us:9443/ws/btcusdt@aggTrade
coinbase:
  ws_url: wss://ws-feed.exchange.coinbase.com
  product_id: BTC-USD
kraken:
  ws_url: wss://ws.kraken.com
bybit:
  ws_url: wss://stream.bybit.com/v5/public/linear
  rest_url: https://api.bybit.com
  funding_poll_s: 300.0
deribit:
  rest_url: https://www.deribit.com/api/v2/public
  poll_interval_s: 60.0
  iv_ratio_min: 0.5
  iv_ratio_max: 2.0
entry_timing:
  normal_fraction: 0.6
  late_max_penalty: 0.6
  final_min_probability: 0.9
  flip_enabled: true
  flip_edge_premium: 0.015
bankroll_acceleration:
  enabled: true
sprt:
  alpha: 0.05
  beta: 0.1
  observation_interval_s: 10.0
regime:
  lookback: 50
  vol_high_percentile: 75
  vol_low_percentile: 25
  autocorr_threshold: 0.25
